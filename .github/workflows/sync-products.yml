name: Sync Pokemon Card Product Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: pokeca-product-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore private collector configuration
        run: node scripts/restore-private-config.mjs
        env:
          POKECA_COLLECTOR_CONFIG_B64: ${{ secrets.POKECA_COLLECTOR_CONFIG_B64 }}

      - name: Sync Pokemon Card product catalog
        run: npm run sync:products

      - name: Commit updated product catalog
        run: |
          git config user.name "pokeca-life-bot"
          git config user.email "pokeca-life-bot@users.noreply.github.com"
          git add product-catalog.json product-catalog-status.json product-image-audit.json product-review-queue.json assets/product-images
          if git diff --cached --quiet; then
            echo "No product catalog changes"
          else
            git commit -m "chore: sync product catalog"
            git push
          fi
