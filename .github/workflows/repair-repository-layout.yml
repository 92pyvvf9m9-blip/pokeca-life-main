name: Repair Repository Layout

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-repository-layout
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Repair project layout
        run: node scripts/repair-project-layout.mjs

      - name: Commit repaired layout
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No repository layout changes were needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair repository layout"
          git push
